<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Перевод клиенту Kaspi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f5f5; /* Цвет фона за пределами мобильного экрана (для ПК) */
        }
        
        /* Стили для поля ввода суммы */
        input[type="tel"] {
            caret-color: #F14635; /* Красный курсор Kaspi */
        }
        input[type="tel"]::placeholder {
            color: #b3b3b3;
        }

        /* Анимация появления картинки */
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(15px) scale(0.98); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        /* Скрытие скроллбара для красоты */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="flex justify-center h-screen m-0 overflow-hidden">

    <!-- Главный контейнер (имитация экрана телефона) -->
    <div class="w-full max-w-md h-[100dvh] bg-[#F5F5F9] flex flex-col relative shadow-2xl overflow-y-auto">
        
        <!-- Шапка -->
        <header class="bg-white flex items-center justify-between px-4 py-3 sticky top-0 z-10">
            <button class="text-[#F14635] p-1">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <h1 class="text-[17px] font-medium text-black">Клиенту Kaspi</h1>
            <div class="w-6"></div> <!-- Пустой блок для центрирования заголовка -->
        </header>

        <!-- Блок получателя -->
        <div class="bg-white mt-2 px-4 py-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 font-medium text-lg overflow-hidden">
                <!-- Заглушка аватарки -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z"/>
                </svg>
            </div>
            <div class="flex flex-col">
                <span class="text-[17px] font-medium text-black">Имя Фамилия</span>
                <span class="text-[14px] text-gray-500 mt-0.5">+7 777 ••• •• 00</span>
            </div>
        </div>

        <!-- Поле ввода суммы -->
        <div class="bg-white mt-2 px-4 py-8 flex flex-col items-center justify-center">
            <div class="relative flex items-baseline justify-center w-full">
                <input 
                    type="tel" 
                    id="amount" 
                    class="text-[40px] font-bold text-center text-black outline-none bg-transparent p-0 m-0 w-[28px]" 
                    placeholder="0"
                    autocomplete="off"
                    maxlength="10"
                >
                <span class="text-[40px] font-bold text-black ml-1 hidden" id="currency">₸</span>
                <!-- Скрытый элемент для точного вычисления ширины текста -->
                <span id="width-machine" class="absolute opacity-0 pointer-events-none whitespace-pre text-[40px] font-bold -z-10" aria-hidden="true">0</span>
            </div>
            <div class="text-[#13B156] text-[14px] mt-2 font-medium">Комиссия 0 ₸</div>
        </div>

        <!-- ========================================== -->
        <!-- СКРЫТАЯ КАРТИНКА (ПОЯВЛЯЕТСЯ ПРИ ВВОДЕ) -->
        <!-- ========================================== -->
        <div id="secret-image-container" class="hidden mt-6 px-4 pb-24">
            <div class="bg-white rounded-2xl p-2 shadow-sm border border-gray-100">
                <!-- ВСТАВЬТЕ ССЫЛКУ НА ВАШУ КАРТИНКУ В АТРИБУТ src НИЖЕ -->
                <img 
                    src="big-monke-flips-you-off-what-u-do-v0-861gk9gqka0c1.webp" 
                    alt="Секретная картинка" 
                    class="w-full h-auto rounded-xl object-cover"
                >
            </div>
            <p class="text-center text-gray-400 text-sm mt-3">Сюрприз!</p>
        </div>
        <!-- ========================================== -->

        <!-- Кнопка оплаты (внизу экрана) -->
        <div class="mt-auto px-4 py-4 bg-[#F5F5F9] sticky bottom-0 z-10 w-full">
            <button id="pay-btn" class="w-full bg-[#0089D0] text-white py-[14px] rounded-xl font-medium text-[17px] opacity-50 pointer-events-none transition-all duration-200">
                Перевести
            </button>
        </div>

    </div>

    <!-- Логика работы страницы -->
    <script>
        const amountInput = document.getElementById('amount');
        const payBtn = document.getElementById('pay-btn');
        const imageContainer = document.getElementById('secret-image-container');
        const currencySymbol = document.getElementById('currency');
        const widthMachine = document.getElementById('width-machine');

        // Изначальный цвет кнопки Kaspi для переводов (голубой). 
        // Для оплаты услуг обычно используется красный #F14635.
        // Вы можете поменять bg-[#0089D0] на bg-[#F14635] в HTML выше, если нужен красный.

        amountInput.addEventListener('input', function(e) {
            // Удаляем все нечисловые символы
            let rawValue = this.value.replace(/\D/g, '');
            
            if (rawValue.length > 0) {
                // Если сумма больше нуля

                // Форматируем число с пробелами (например, 1 000)
                const formattedValue = new Intl.NumberFormat('ru-RU').format(rawValue).replace(/,/g, ' ');
                this.value = formattedValue;
                
                // Подгоняем ширину поля ввода под текст, чтобы значок ₸ всегда стоял ровно рядом
                widthMachine.textContent = formattedValue;
                this.style.width = widthMachine.offsetWidth + 'px';
                
                currencySymbol.classList.remove('hidden');

                // Активируем кнопку
                payBtn.classList.remove('opacity-50', 'pointer-events-none');
                payBtn.textContent = `Перевести ${formattedValue} ₸`;

            } else {
                // Если поле пустое
                this.value = '';
                widthMachine.textContent = '0';
                this.style.width = widthMachine.offsetWidth + 'px';
                currencySymbol.classList.add('hidden');
                
                // Деактивируем кнопку
                payBtn.classList.add('opacity-50', 'pointer-events-none');
                payBtn.textContent = 'Перевести';

                // Если стерли сумму, скрываем картинку обратно (по желанию)
                imageContainer.classList.add('hidden');
                imageContainer.classList.remove('fade-in');
                payBtn.classList.remove('bg-[#13B156]');
                payBtn.classList.add('bg-[#0089D0]');
            }
        });

        // Показываем картинку ТОЛЬКО при нажатии на кнопку "Перевести"
        payBtn.addEventListener('click', function() {
            if (imageContainer.classList.contains('hidden')) {
                imageContainer.classList.remove('hidden');
                // Задержка для плавности
                setTimeout(() => {
                    imageContainer.classList.add('fade-in');
                    // Плавный скролл вниз к картинке
                    imageContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }, 10);

                // Делаем кнопку зеленой (успешный перевод)
                this.textContent = 'Успешно!';
                this.classList.add('bg-[#13B156]');
                this.classList.remove('bg-[#0089D0]');
            }
        });
    </script>
</body>
</html>

services:
  # Ваш сайт
  web:
    build: .
    container_name: bank-web
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=kaaspi.shop,www.kaaspi.shop
      - LETSENCRYPT_HOST=kaaspi.shop,www.kaaspi.shop
      - LETSENCRYPT_EMAIL=admin@kaaspi.shop
    restart: always

  # Прокси-сервер, который будет принимать запросы на 80 и 443 портах
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    restart: always

  # Сервис для автоматического получения и обновления SSL-сертификатов
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - acme:/etc/acme.sh
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    depends_on:
      - nginx-proxy
    restart: always

volumes:
  certs:
  vhost:
  html:
  acme:
